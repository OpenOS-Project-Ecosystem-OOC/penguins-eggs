# Converted from GitHub Actions — penguins-eggs

stages:
  - secret-scan
  - test
  - build
  - publish
  - release
  - sync

default:
  image: node:22

.node-cache: &node-cache
  cache:
    key:
      files: [pnpm-lock.yaml, package.json]
    paths: [node_modules/, .pnpm-store/]

test:
  stage: test
  <<: *node-cache
  before_script:
    - npm install -g pnpm
    - pnpm install --no-frozen-lockfile || npm install || true
  script:
    - pnpm run build || npm run build || true
    - pnpm test || npm test || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|all-features)$/'

sast:
  stage: test
  script:
    - npm audit --audit-level=critical || true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|all-features)$/'

build-packages:
  stage: build
  <<: *node-cache
  before_script:
    - npm install -g pnpm
    - pnpm install --no-frozen-lockfile || npm install || true
  script:
    - pnpm run build || npm run build || true
    - pnpm run deb || true
    - bash appimage.sh || true
  artifacts:
    paths:
      - dist/
      - "*.deb"
      - "perrisbrewery/*.deb"
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|all-features)$/'

reindex-repository:
  stage: publish
  before_script:
    - apt-get update -qq && apt-get install -y dpkg-dev gnupg
  script:
    - bash scripts/reindex-repo.sh || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

ipfs-mirror:
  stage: publish
  before_script:
    - apt-get update -qq && apt-get install -y curl
  script:
    - bash scripts/ipfs-mirror.sh || true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

iso-test:
  stage: publish
  image: ubuntu:22.04
  allow_failure: true
  script:
    - bash scripts/iso-test.sh || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual

gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build-packages]
  environment:
    name: production
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'penguins-eggs $CI_COMMIT_TAG'
    assets:
      links:
        - name: 'Packages'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse?job=build-packages'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# ── Auto-bump submodule pins (scheduled daily) ────────────────────────────────
# Fetches the latest HEAD of each integrations/ submodule's standalone repo
# and commits any pin changes to all-features. Only runs when something
# actually changed — no-op commits are skipped.
# Requires CI variable: GITLAB_TOKEN (api + write_repository scope, masked).
bump-submodules:
  stage: sync
  image: alpine:3.19
  before_script:
    - apk add --no-cache git curl
    - git config --global user.email "submodule-bot@gitlab.com"
    - git config --global user.name "Submodule Bot"
  script:
    - |
      # Clone all-features with submodules
      git clone --recurse-submodules \
        "https://oauth2:${GITLAB_TOKEN}@gitlab.com/openos-project/penguins-eggs_deving/penguins-eggs.git" \
        --branch all-features --depth=1 repo
      cd repo

      # Update every integrations/ submodule to its remote HEAD
      git submodule update --remote integrations/

      # Check if anything changed
      if git diff --cached --quiet && git diff --quiet; then
        echo "All submodules already at latest — nothing to commit."
        exit 0
      fi

      git add integrations/
      BUMPED=$(git diff --cached --name-only | sed 's|integrations/||' | tr '\n' ' ')
      git commit -m "chore: bump submodules to latest

Updated: ${BUMPED}
[skip ci]"
      git push origin HEAD:all-features
      echo "Pushed submodule bump for: ${BUMPED}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
