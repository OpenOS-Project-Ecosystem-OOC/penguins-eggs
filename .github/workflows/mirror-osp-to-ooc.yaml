name: Mirror to OpenOS-Project-Ecosystem-OOC

on:
  push:
    branches: ["**"]
    tags: ["**"]
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository == 'OpenOS-Project-OSP/penguins-eggs'
    steps:
      - name: Checkout full history (detached HEAD)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Fetch all branches and tags
        run: git fetch --all --tags --prune

      - name: Rewrite docs placeholder URLs for OOC
        run: |
          REPO_URL="https://github.com/OpenOS-Project-Ecosystem-OOC/penguins-eggs"
          find . -path './.git' -prune -o -name '*.md' -print | while read f; do
            sed -i \
              -e "s|{{REPO_BLOB}}|${REPO_URL}/blob/all-features|g" \
              -e "s|{{REPO_TREE}}|${REPO_URL}/tree/all-features|g" \
              "$f"
          done
          git config user.email "mirror-bot@github.com"
          git config user.name "Mirror Bot"
          git diff --quiet || git commit -am "chore: rewrite docs URLs for OpenOS-Project-Ecosystem-OOC mirror"

      - name: Push mirror to OpenOS-Project-Ecosystem-OOC
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$MIRROR_TOKEN" \
            > ~/.git-credentials
          git remote add mirror \
            "https://github.com/OpenOS-Project-Ecosystem-OOC/penguins-eggs.git"
          git push mirror 'refs/remotes/origin/*:refs/heads/*' --force
          git push mirror --tags --force
          rm -f ~/.git-credentials
