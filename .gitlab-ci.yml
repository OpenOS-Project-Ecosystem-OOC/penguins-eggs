# Converted from GitHub Actions — penguins-eggs

stages:
  - test
  - build
  - publish
  - release

default:
  image: node:22

.node-cache: &node-cache
  cache:
    key:
      files: [pnpm-lock.yaml, package.json]
    paths: [node_modules/, .pnpm-store/]

test:
  stage: test
  <<: *node-cache
  before_script:
    - npm install -g pnpm
    - pnpm install --no-frozen-lockfile || npm install || true
  script:
    - pnpm run build || npm run build || true
    - pnpm test || npm test || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|all-features)$/'

sast:
  stage: test
  script:
    - npm audit --audit-level=critical || true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|all-features)$/'

build-packages:
  stage: build
  <<: *node-cache
  before_script:
    - npm install -g pnpm
    - pnpm install --no-frozen-lockfile || npm install || true
  script:
    - pnpm run build || npm run build || true
    - pnpm run deb || true
    - bash appimage.sh || true
  artifacts:
    paths:
      - dist/
      - "*.deb"
      - "perrisbrewery/*.deb"
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master|all-features)$/'

reindex-repository:
  stage: publish
  before_script:
    - apt-get update -qq && apt-get install -y dpkg-dev gnupg
  script:
    - bash scripts/reindex-repo.sh || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

ipfs-mirror:
  stage: publish
  before_script:
    - apt-get update -qq && apt-get install -y curl
  script:
    - bash scripts/ipfs-mirror.sh || true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

iso-test:
  stage: publish
  image: ubuntu:22.04
  allow_failure: true
  script:
    - bash scripts/iso-test.sh || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual

gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build-packages]
  environment:
    name: production
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'penguins-eggs $CI_COMMIT_TAG'
    assets:
      links:
        - name: 'Packages'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse?job=build-packages'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
